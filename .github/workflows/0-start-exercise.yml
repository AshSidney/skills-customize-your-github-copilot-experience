name: Step 0 # Start Exercise

on:
  push:
    branches:
      - 'participant/*'

permissions:
  contents: write
  issues: write

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: Start participant exercise
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.issue.outputs.issue-number }}
      issue-url: ${{ steps.issue.outputs.issue-url }}
    steps:
      - name: Find or create participant exercise issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PARTICIPANT_BRANCH: ${{ github.ref_name }}
          EXERCISE_TITLE: "Customize Your GitHub Copilot Experience"
          INTRO_MESSAGE: "Learn how to customize GitHub Copilot to work better for your team and projects."
        run: |
          marker="[$PARTICIPANT_BRANCH]"
          title="Exercise: $EXERCISE_TITLE $marker"
          issue_number=$(gh issue list --repo "$REPOSITORY" --state open --limit 200 --json number,title | jq -r --arg marker "$marker" --arg exerciseTitle "$EXERCISE_TITLE" '.[] | select((.title | contains($marker)) and (.title | contains($exerciseTitle))) | .number' | head -n 1)
          if [ -z "$issue_number" ]; then
            body=$(printf "%s\n\nParticipant branch: %s\n" "$INTRO_MESSAGE" "$PARTICIPANT_BRANCH")
            issue_url=$(gh issue create --repo "$REPOSITORY" --title "$title" --body "$body")
            issue_number=$(gh issue view "$issue_url" --repo "$REPOSITORY" --json number --jq '.number')
          else
            issue_url=$(gh issue view "$issue_number" --repo "$REPOSITORY" --json url --jq '.url')
          fi
          echo "issue-number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "issue-url=$issue_url" >> "$GITHUB_OUTPUT"

  update_assignment_dates:
    name: Update assignment dates in config.json
    runs-on: ubuntu-latest
    needs: [start_exercise]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Update assignment dates
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            // Helper function to get date with offset
            const getDate = (daysOffset) => {
              const date = new Date();
              date.setDate(date.getDate() + daysOffset);
              return date.toISOString().split('T')[0];
            };

            // Read and update config.json
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));

            // Update assignment dates
            config.assignments[0].dueDate = getDate(-45);  // 45 days ago
            config.assignments[1].dueDate = getDate(-30);  // 30 days ago
            config.assignments[2].dueDate = getDate(-20);  // 20 days ago
            config.assignments[3].dueDate = getDate(14);   // 2 weeks ahead

            // Write updated config.json
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2) + '\n');

      - name: Commit updated config.json
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "config.json"
          message: "Update assignment due dates for exercise start"
          default_author: github_actions
