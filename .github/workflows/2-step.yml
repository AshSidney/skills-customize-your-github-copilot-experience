name: Step 2

on:
  push:
    branches:
      - 'participant/*'
    paths:
      - ".github/instructions/**"
      - "**/*.instructions.md"
      - "assignments/games-in-python/**"

permissions:
  contents: read
  issues: write

jobs:
  find_exercise:
    name: Find participant exercise issue
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.find.outputs.issue-number }}
      issue-url: ${{ steps.find.outputs.issue-url }}
    steps:
      - name: Find exercise issue for participant branch
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          EXERCISE_TITLE: "Customize Your GitHub Copilot Experience"
        run: |
          branch="$HEAD_REF"
          if [ -z "$branch" ] && [[ "$ISSUE_TITLE" =~ \[(participant/[^]]+)\] ]]; then
            branch="${BASH_REMATCH[1]}"
          fi
          if [ -z "$branch" ] && [[ "$REF_NAME" == participant/* ]]; then
            branch="$REF_NAME"
          fi
          if [ -z "$branch" ]; then
            echo "Unable to determine participant branch for this event." >&2
            exit 1
          fi
          marker="[$branch]"
          issue_number=$(gh issue list --repo "$REPOSITORY" --state open --limit 200 --json number,title | jq -r --arg marker "$marker" --arg exerciseTitle "$EXERCISE_TITLE" '.[] | select((.title | contains($marker)) and (.title | contains($exerciseTitle))) | .number' | head -n 1)
          if [ -z "$issue_number" ]; then
            echo "No open exercise issue found for $EXERCISE_TITLE $marker." >&2
            exit 1
          fi
          issue_url=$(gh issue view "$issue_number" --repo "$REPOSITORY" --json url --jq '.url')
          echo "issue-number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "issue-url=$issue_url" >> "$GITHUB_OUTPUT"

  check_step_work:
    name: Check step work
    needs: [find_exercise]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get response templates
        uses: actions/checkout@v5
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.9.3

      # START: Check practical exercise

      - name: Check if assignments.instructions.md exists
        id: check-file-exists
        continue-on-error: true
        uses: skills/exercise-toolkit/actions/file-exists@v0.9.3
        with:
          file: ".github/instructions/assignments.instructions.md"

      - name: Check for applyTo pattern in assignments.instructions.md
        id: check-for-applyto
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: ".github/instructions/assignments.instructions.md"
          keyphrase: "applyTo"

      - name: Check for Objective section in games-in-python README
        id: check-for-objective
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: "assignments/games-in-python/README.md"
          keyphrase: "🎯 Objective"

      - name: Check for Tasks section in games-in-python README
        id: check-for-tasks
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v2
        with:
          text-file: "assignments/games-in-python/README.md"
          keyphrase: "📝 Tasks"

      # END: Check practical exercise

      - name: Create comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 2
            results_table:
              - description: "Created assignments.instructions.md file"
                passed: ${{ steps.check-file-exists.outcome == 'success' }}
              - description: "Checked for applyTo pattern in assignments.instructions.md"
                passed: ${{ steps.check-for-applyto.outcome == 'success' }}
              - description: "Checked for 🎯 Objective section in games-in-python README"
                passed: ${{ steps.check-for-objective.outcome == 'success' }}
              - description: "Checked for 📝 Tasks section in games-in-python README"
                passed: ${{ steps.check-for-tasks.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1
